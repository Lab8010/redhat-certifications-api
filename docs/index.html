<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Red Hat Certifications</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .retired { display: none; }
    .cert-card { margin-bottom: 1rem; }
    .cert-card .card { border-width: 2px !important; }
    .cert-card .card.border-danger { border-width: 2px !important; }
    .exam-badge { font-family: monospace; letter-spacing: 0.5px; }
    .filter-section { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
    .filter-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #6c757d; letter-spacing: 0.5px; display: block; margin-bottom: 0.4rem; }
    .tag-hash { color: #6c757d; font-size: 0.78rem; }

    /* Red Hat global header */
    .rh-header {
      background-color: #151515;
      border-bottom: 3px solid #EE0000;
    }
    .rh-site-name {
      color: #d2d2d2;
      font-size: 1.15rem;
      font-weight: 400;
    }
    .rh-meta {
      color: #9a9a9a;
      font-size: 0.78rem;
      margin-top: 0.3rem;
    }
    .rh-meta a {
      color: #bbb;
      text-decoration: none;
    }
    .rh-meta a:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body class="bg-light">

  <!-- Red Hat global header -->
  <header class="rh-header">
    <div class="container py-3">
      <span class="rh-site-name">
        <span style="color:#EE0000; font-weight:700;">Red Hat</span>
        <span style="color:#fff; font-weight:700;"> Certification Lists</span>
      </span>
      <div class="rh-meta">
        Questions? Visit <a href="https://access.redhat.com/community/learn" target="_blank">Red Hat Training &amp; Certification space</a>
        &nbsp;|&nbsp; Maintained by <a href="https://github.com/Lab8010" target="_blank">Lab8010</a>
        &nbsp;|&nbsp; <a href="https://x.com/lab8010" target="_blank">@lab8010 on X</a>
        &nbsp;|&nbsp; Last updated: <span id="lastUpdated">2026-04-16 JST</span>
      </div>
    </div>
  </header>

  <div class="container py-4">

    <!-- Filter section -->
    <div class="filter-section">

      <!-- Category -->
      <div class="mb-3">
        <span class="filter-label">Category</span>
        <div class="d-flex flex-wrap gap-2">
          <button class="btn btn-sm category-btn btn-secondary"       data-value="" data-color="secondary">All</button>
          <button class="btn btn-sm category-btn btn-outline-danger"  data-value="RHEL"         data-color="danger">RHEL</button>
          <button class="btn btn-sm category-btn btn-outline-warning" data-value="Ansible"      data-color="warning">Ansible</button>
          <button class="btn btn-sm category-btn btn-outline-primary" data-value="OpenShift"    data-color="primary">OpenShift</button>
          <button class="btn btn-sm category-btn btn-outline-success" data-value="Cloud-Native" data-color="success">Cloud-Native</button>
        </div>
      </div>

      <!-- Level -->
      <div class="mb-3">
        <span class="filter-label">Level</span>
        <div class="d-flex flex-wrap gap-2">
          <button class="btn btn-sm level-btn rounded-pill btn-secondary"      data-value="">All</button>
          <button class="btn btn-sm level-btn rounded-pill btn-outline-secondary" data-value="Level 100">100</button>
          <button class="btn btn-sm level-btn rounded-pill btn-outline-secondary" data-value="Level 200">200</button>
          <button class="btn btn-sm level-btn rounded-pill btn-outline-secondary" data-value="Level 300">300</button>
          <button class="btn btn-sm level-btn rounded-pill btn-outline-secondary" data-value="Level 400">400</button>
        </div>
      </div>

      <!-- Bottom row: Product / Sort / Show Retired / Count -->
      <div class="row g-2 align-items-end">
        <div class="col-auto">
          <span class="filter-label">Product</span>
          <select class="form-select form-select-sm" id="filterProduct" style="min-width:160px">
            <option value="">All Products</option>
          </select>
        </div>
        <div class="col-auto">
          <span class="filter-label">Sort by Level</span>
          <select class="form-select form-select-sm" id="sortOrder">
            <option value="asc">100 → 400</option>
            <option value="desc">400 → 100</option>
          </select>
        </div>
        <div class="col-auto d-flex align-items-end pb-1">
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" role="switch" id="showRetired">
            <label class="form-check-label small" for="showRetired">Show Retired</label>
          </div>
        </div>
        <div class="col-auto ms-auto d-flex align-items-end pb-1">
          <span class="text-muted small" id="resultCount"></span>
        </div>
      </div>
    </div>

    <!-- Cards -->
    <div id="certifications" class="row"></div>
  </div>

  <script>
    let allCertifications = [];
    let filteredCertifications = [];
    let selectedCategory = "";
    let selectedLevel = "";

    const categoryColors = {
      "RHEL":         "danger",
      "Ansible":      "warning",
      "OpenShift":    "primary",
      "Cloud-Native": "success"
    };

    function getLevelNumber(level) {
      const match = (level || "").match(/Level (\d+)/);
      return match ? parseInt(match[1]) : 0;
    }

    function updateResultCount() {
      const showRetired = document.getElementById("showRetired").checked;
      const visible = filteredCertifications.filter(c => showRetired || c.status !== "Retired").length;
      const total   = allCertifications.filter(c => showRetired || c.status !== "Retired").length;
      document.getElementById("resultCount").textContent = `Showing ${visible} of ${total}`;
    }

    function renderCertifications(certs) {
      const container = document.getElementById("certifications");
      container.innerHTML = "";

      certs.forEach(cert => {
        const isRetired     = cert.status === "Retired";
        const categoryColor = categoryColors[cert.category] || "secondary";

        const card = document.createElement("div");
        card.className = "col-12 col-md-6 cert-card" + (isRetired ? " retired" : "");

        card.innerHTML = `
          <div class="card h-100 ${isRetired ? "border-danger border-opacity-25" : ""}">
            <div class="card-body d-flex flex-column">
              <!-- Badge row -->
              <div class="d-flex justify-content-between align-items-start mb-2">
                <div class="d-flex flex-wrap gap-1">
                  <span class="badge bg-dark exam-badge">${cert.exam}</span>
                  ${cert.level ? `<span class="badge bg-light text-dark border">${cert.level}</span>` : ""}
                  <span class="badge bg-${categoryColor}">${cert.category}</span>
                  ${cert.product ? `<span class="badge bg-light text-dark border">📦 ${cert.product}</span>` : ""}
                </div>
                <span class="badge ${isRetired ? "bg-danger" : "bg-success"} flex-shrink-0 ms-1">
                  ${isRetired ? "Retired" : "Active"}
                </span>
              </div>
              <!-- Title -->
              <h6 class="card-title mb-1">${cert.title}</h6>
              <!-- Description -->
              ${(cert.description_ja || cert.description) ? `<p class="card-text text-muted small mb-1">${cert.description_ja || cert.description}</p>` : ""}
              <!-- Tags -->
              ${cert.tags && cert.tags.length ? `<div class="mb-2">${cert.tags.map(t => `<span class="tag-hash me-1">#${t}</span>`).join("")}</div>` : ""}
              <!-- Two-column: Exam | Training -->
              <div class="row g-0 mt-auto pt-2 border-top">
                <!-- Left: Exam -->
                <div class="col-6 pe-2 border-end d-flex flex-column gap-1">
                  <div class="small fw-semibold text-muted mb-1">📋 試験</div>
                  ${cert.duration ? `<div class="small text-muted">⏱ ${cert.duration}</div>` : ""}
                  <div class="d-flex gap-1 flex-wrap mt-auto">
                    ${cert.url_en ? `<a href="${cert.url_en}" class="btn btn-sm btn-primary" target="_blank">EN</a>` : ""}
                    ${cert.url_ja ? `<a href="${cert.url_ja}" class="btn btn-sm btn-outline-secondary" target="_blank">JA</a>` : ""}
                  </div>
                </div>
                <!-- Right: Training -->
                <div class="col-6 ps-2 d-flex flex-column gap-1">
                  <div class="small fw-semibold text-muted mb-1">🎓 トレーニング</div>
                  ${cert.training_course ? `
                    <div class="small text-muted"><strong>${cert.training_course}</strong></div>
                    ${cert.training_course_name ? `<div class="small text-muted" style="font-size:0.72rem;line-height:1.3">${cert.training_course_name}</div>` : ""}
                    <div class="d-flex gap-1 flex-wrap mt-auto">
                      ${cert.training_url_en ? `<a href="${cert.training_url_en}" class="btn btn-sm btn-success" target="_blank">EN</a>` : ""}
                      ${cert.training_url_ja ? `<a href="${cert.training_url_ja}" class="btn btn-sm btn-outline-secondary" target="_blank">JA</a>` : ""}
                    </div>
                  ` : `<div class="small text-muted fst-italic">—</div>`}
                </div>
              </div>
            </div>
          </div>`;
        container.appendChild(card);
      });

      applyRetiredFilter();
      updateResultCount();
    }

    function applyFiltersAndSort() {
      const productFilter = document.getElementById("filterProduct").value;
      const sortOrder     = document.getElementById("sortOrder").value;

      filteredCertifications = allCertifications.filter(cert => {
        const categoryMatch = !selectedCategory || cert.category === selectedCategory;
        const levelMatch    = !selectedLevel    || cert.level    === selectedLevel;
        const productMatch  = !productFilter    || (cert.product || "") === productFilter;
        return categoryMatch && levelMatch && productMatch;
      });

      filteredCertifications.sort((a, b) => {
        const la = getLevelNumber(a.level);
        const lb = getLevelNumber(b.level);
        return sortOrder === "asc" ? la - lb : lb - la;
      });

      renderCertifications(filteredCertifications);
    }

    function applyRetiredFilter() {
      const showRetired = document.getElementById("showRetired").checked;
      document.querySelectorAll(".retired").forEach(card => {
        card.style.display = showRetired ? "" : "none";
      });
      updateResultCount();
    }

    function setCategoryFilter(value) {
      selectedCategory = value;
      document.querySelectorAll(".category-btn").forEach(btn => {
        const color    = btn.dataset.color;
        const isActive = btn.dataset.value === value;
        btn.className  = `btn btn-sm category-btn ${isActive ? `btn-${color}` : `btn-outline-${color}`}`;
      });
      applyFiltersAndSort();
    }

    function setLevelFilter(value) {
      selectedLevel = value;
      document.querySelectorAll(".level-btn").forEach(btn => {
        const isActive = btn.dataset.value === value;
        btn.className  = `btn btn-sm level-btn rounded-pill ${isActive ? "btn-secondary" : "btn-outline-secondary"}`;
      });
      applyFiltersAndSort();
    }

    function populateProductFilter() {
      const select   = document.getElementById("filterProduct");
      const products = new Set();
      allCertifications.forEach(cert => {
        if (cert.product && cert.product.trim()) products.add(cert.product);
      });
      Array.from(products).sort().forEach(p => {
        const opt = document.createElement("option");
        opt.value = opt.textContent = p;
        select.appendChild(opt);
      });
    }

    fetch("./data/certifications.json")
      .then(r => r.json())
      .then(data => {
        allCertifications = data;
        populateProductFilter();
        applyFiltersAndSort();

        document.querySelectorAll(".category-btn").forEach(btn =>
          btn.addEventListener("click", () => setCategoryFilter(btn.dataset.value)));
        document.querySelectorAll(".level-btn").forEach(btn =>
          btn.addEventListener("click", () => setLevelFilter(btn.dataset.value)));
        document.getElementById("showRetired").addEventListener("change", applyRetiredFilter);
        document.getElementById("filterProduct").addEventListener("change", applyFiltersAndSort);
        document.getElementById("sortOrder").addEventListener("change", applyFiltersAndSort);
      })
      .catch(err => {
        document.getElementById("certifications").innerHTML =
          `<div class="text-danger">Failed to load certifications: ${err}</div>`;
      });
  </script>
</body>
</html>
